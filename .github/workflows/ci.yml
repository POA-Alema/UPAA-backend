name: Backend Pipeline

on:
  pull_request:
    branches: [main, develop]


defaults:
  run:
    shell: bash

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Install commitlint
        run: npm install -D @commitlint/cli @commitlint/config-conventional
      - name: Print versions
        run: |
          git --version
          node --version
          npm --version
          npx commitlint --version
      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: npx commitlint --last --verbose

      - name: Validate PR commit messages
        if: github.event_name == 'pull_request'    
        run: npx commitlint --from ${{ github.event.pull_request.base.sha || 'HEAD~1' }} --to HEAD --verbose
      
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: v24.14.0
          cache: npm

      - name: Install Dependencies
        id: install
        run: npm ci

      - name: Lint Codebase
        id: super-linter
        uses: super-linter/super-linter/slim@v8
        env:
          DEFAULT_BRANCH: origin/main
          FILTER_REGEX_EXCLUDE: dist/**/*
          LINTER_RULES_PATH: .
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_JSCPD: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_JSON: false
          VALIDATE_CHECKOV: false  

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: mongo
          MONGO_INITDB_ROOT_PASSWORD: mongo
          MONGO_INITDB_DATABASE: app_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
            
      # ── Prisma ──
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: mongodb://mongo:mongo@localhost:27017/app_test?authSource=admin

      # ── Build de produção ──
      - name: Build
        run: npm run build

      # ── Testes unitários ──
      - name: Run unit tests
        run: npm run test -- --coverage --passWithNoTests
        env:
          DATABASE_URL: mongodb://mongo:mongo@localhost:27017/app_test?authSource=admin
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  required:
      name: All checks passed
      runs-on: ubuntu-latest
      if: ${{ always() }}
      needs:
        - quality
        - lint
      steps:
      - name: Check results           # ✅ step obrigatório adicionado
        run: |
          if [[ "${{ needs.quality.result }}" != "success" ||
                "${{ needs.lint.result }}"    != "success"]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All checks passed."